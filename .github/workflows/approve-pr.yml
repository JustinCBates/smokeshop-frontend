name: Approve PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve'
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  approve:
    name: Approve PR #${{ github.event.inputs.pr_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Approve pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ github.event.inputs.pr_number }}'),
              event: 'APPROVE',
              body: 'Approved manually via workflow dispatch.'
            });
            console.log('PR #${{ github.event.inputs.pr_number }} approved.');
