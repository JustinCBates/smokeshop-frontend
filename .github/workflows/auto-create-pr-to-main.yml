name: Auto-create PR to Main

on:
  push:
    branches: [build]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create PR build → main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if none exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:build`,
              base: 'main',
              state: 'open'
            });

            if (prs.length > 0) {
              core.info(`PR already open: #${prs[0].number} ${prs[0].html_url}`);
              return;
            }

            const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: 'main...build'
            });

            const commitList = compare.commits
              .map(c => `- \`${c.sha.slice(0,7)}\` ${c.commit.message.split('\n')[0]}`)
              .join('\n') || '_No new commits_';

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'promote: build → main (production)',
              head: 'build',
              base: 'main',
              body: `## Promote build → main\n\nReview and approve to deploy to **production**.\n\n### Commits\n${commitList}`
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
