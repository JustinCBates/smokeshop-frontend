name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          VPS_USER="${{ secrets.VPS_SSH_USER }}" \
          VPS_HOST="${{ secrets.VPS_SSH_HOST }}" \
          VPS_PORT="${{ secrets.VPS_SSH_PORT }}" \
          VPS_SSH_KEY="$HOME/.ssh/id_ed25519" \
          VPS_APP_DIR="/opt/smokeshop/smokeshop-frontend" \
          CADDYFILE_PATH="/opt/patriotic-projects/vscode-proxy/Caddyfile" \
          bash scripts/deploy-vps-frontend.sh

      - name: Verify deployment
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" https://neutraldevelopment.com)
          if [ $response -eq 200 ] || [ $response -eq 301 ] || [ $response -eq 302 ]; then
            echo "✅ Deployment successful"
          else
            echo "⚠️ Warning: Site returned HTTP $response"
          fi

      - name: Deployment summary
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "🌐 URL: https://neutraldevelopment.com"
          echo "⏰ Time: $(date)"
